      "mermaid": "sequenceDiagram\n    participant C as 运营后台\n    participant A as admin-server\n    participant O as order-service\n    participant W as 微信支付\n    participant P as product-service\n    participant U as member-service\n    participant Pr as promotion-service\n    participant DB as MySQL\n    participant MQ as MQ\n\n    C->>A: POST /sys/order/refund\n    A->>A: Shiro 校验 order:refund\n    A->>O: Feign: POST /v1/order/refund\n    O->>DB: SELECT order FOR UPDATE\n    O->>O: 校验 order.status=PAID 且未已退款\n    O->>DB: SELECT payment WHERE status=SUCCESS\n    O->>DB: INSERT refund (status=PROCESSING)\n    O->>W: 调用微信退款接口\n    alt 微信退款失败\n        O->>DB: UPDATE refund SET status=FAILED\n        O-->>A: 400 微信退款失败\n    end\n    W-->>O: 退款受理成功\n    O->>DB: UPDATE order SET status=REFUNDED\n    O->>P: Feign: POST /v1/product/stock/refund 退库存\n    opt 订单使用了积分\n        O->>U: Feign: POST /v1/member/points/refund 退还积分\n    end\n    opt 订单已返积分\n        O->>U: Feign: POST /v1/member/points/deduct 扣回已返积分\n    end\n    opt 订单使用了券\n        O->>Pr: Feign: POST /v1/promotion/coupon/refund 退还券\n    end\n    O->>DB: UPDATE refund SET status=SUCCESS\n    rect rgb(255, 230, 150)\n        O->>MQ: 发送 order.refunded\n    end\n    O-->>A: 200\n    A-->>C: 200 BaseResponse",
      "errors": [
        [
          "订单不存在",
          "抛 ServiceException",
          "\"订单不存在\""
        ],
        [
          "订单状态非 PAID",
          "抛 ServiceException",
          "\"订单状态不允许退款\""
        ],
        [
          "**重复退款**",
          "refund 表唯一索引校验",
          "\"订单已申请退款\""
        ],
        [
          "**微信退款失败**",
          "refund=FAILED，订单不变",
          "微信错误信息"
        ],
        [
          "**退库存/积分/券任一失败**",
          "记录到对账表，人工补偿",
          "退款主流程已完成"
        ],
        [
          "已返积分 > 当前余额",
          "允许积分变负，对账补",
          "不抛异常"
        ]
      ],
      "note": "**为什么微信退款失败要回滚 refund，但后续步骤失败不回滚？**",
      "writes": [
        "refund",
        "order"
      ]
    }
  ]
};

const BLOCKS_STATS = {
  "total": 8,
  "stable": 8,
  "draft": 0,
  "deprecated": 0
};

const LAYERS_DATA = [
  {
    "label": "入口层 BFF — 运营后台",
    "type": "bff",
    "services": [
      "admin-server"
    ]
  },
  {
    "label": "入口层 BFF — C 端用户",
    "type": "bff",
    "services": [
      "mini-server"
    ]
  },
  {
    "label": "核心业务层",
    "type": "core",
    "services": [
      "member-service",
      "order-service",
      "product-service",
      "promotion-service"
    ]
  },
  {
    "label": "基础设施",
    "type": "infra",
    "services": [
      "数据库",
      "消息队列"
    ]
  },
  {
    "label": "外部系统",
    "type": "external",
    "services": [
      "支付平台"
    ]
  }
];
</script>
<style>
:root {
  --bg: #F8FAFC;
  --surface: #FFFFFF;
  --surface-2: #F1F5F9;
  --border: #E2E8F0;
  --text-1: #0F172A;
  --text-2: #475569;
  --text-3: #94A3B8;
  --brand: #2563EB;
  --brand-glow: rgba(37,99,235,0.06);
  --blue: #2563EB;
  --blue-glow: rgba(37,99,235,0.06);
  --blue-border: #93C5FD;
  --purple: #7C3AED;
  --purple-glow: rgba(124,58,237,0.06);
  --purple-border: #C4B5FD;
  --green: #059669;
  --green-glow: rgba(5,150,105,0.06);
  --green-border: #6EE7B7;
  --orange: #D97706;
  --orange-glow: rgba(217,119,6,0.06);
  --cyan: #0E7490;
  --radius: 12px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', sans-serif; background: var(--bg); color: var(--text-1); line-height: 1.6; min-height: 100vh; }

/* Header */
.header { padding: 24px 32px 16px; text-align: center; }
.header h1 { font-size: 22px; font-weight: 700; color: var(--text-1); }
.header p { font-size: 13px; color: var(--text-3); margin-top: 4px; }
.header-stats { display: flex; justify-content: center; gap: 20px; margin-top: 12px; }
.header-stat { font-size: 12px; color: var(--text-2); }
.header-stat strong { color: var(--brand); }

/* Architecture Map */
.arch-map { max-width: 1000px; margin: 0 auto; padding: 0 24px; }

.arch-layer {
  position: relative; margin-bottom: 16px;
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; background: var(--surface);
}
.arch-layer-label {
  position: absolute; top: -9px; left: 20px;
  background: var(--surface); padding: 0 10px;
  font-size: 11px; color: var(--text-3); font-weight: 500; letter-spacing: 0.5px;
}
.arch-nodes { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

.arch-node {
  padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all var(--transition); position: relative;
  border: 1px solid var(--border); background: var(--surface-2);
}
.arch-node:hover { transform: translateY(-2px); }
.arch-node.active { transform: translateY(-2px); }
.arch-node .node-count {
  position: absolute; top: -6px; right: -6px;
  width: 18px; height: 18px; border-radius: 50%;
  font-size: 10px; display: flex; align-items: center; justify-content: center;
  font-weight: 600; background: var(--brand); color: white;
  box-shadow: 0 2px 4px rgba(37,99,235,0.3);
}

/* Node colors by layer */
.arch-node.bff { border-color: var(--blue-border); color: var(--blue); }
.arch-node.bff:hover, .arch-node.bff.active { background: var(--blue-glow); border-color: var(--blue); box-shadow: 0 4px 16px rgba(37,99,235,0.12); }
.arch-node.core { border-color: var(--purple-border); color: var(--purple); }
.arch-node.core:hover, .arch-node.core.active { background: var(--purple-glow); border-color: var(--purple); box-shadow: 0 4px 16px rgba(124,58,237,0.12); }
.arch-node.infra { border-color: var(--green-border); color: var(--green); }
.arch-node.infra:hover, .arch-node.infra.active { background: var(--green-glow); border-color: var(--green); box-shadow: 0 4px 16px rgba(5,150,105,0.12); }
.arch-node.external { border-color: #FDE68A; color: var(--orange); }
.arch-node.external:hover, .arch-node.external.active { background: var(--orange-glow); border-color: var(--orange); box-shadow: 0 4px 16px rgba(217,119,6,0.12); }

/* Connection arrow */
.arch-arrow { text-align: center; padding: 6px 0; color: var(--text-3); font-size: 18px; }

/* Blocks Panel */
.blocks-panel {
  max-width: 1000px; margin: 24px auto 0; padding: 0 24px 40px;
  display: none;
}
.blocks-panel.visible { display: block; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px;
}
.panel-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
.panel-title .svc-dot { width: 10px; height: 10px; border-radius: 50%; }
.panel-close {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: var(--text-3); font-size: 16px; transition: all var(--transition);
}
.panel-close:hover { background: var(--surface-2); color: var(--text-1); }

/* Block Groups */
.block-group { margin-bottom: 20px; }
.block-group-title { font-size: 12px; color: var(--text-3); font-weight: 500; margin-bottom: 8px; padding-left: 2px; }

.block-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }

/* Block Item */
.block-item {
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; cursor: pointer; transition: all var(--transition);
}
.block-item:hover { border-color: var(--brand); background: #F8FAFF; }
.block-item.expanded { grid-column: 1 / -1; border-color: var(--brand); background: #EFF6FF; cursor: default; }
.block-item-top { display: flex; align-items: center; justify-content: space-between; }
.block-item-name { font-size: 13px; font-weight: 600; }
.block-item-trigger { font-size: 11px; color: var(--text-3); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
.block-item-services { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
.block-svc-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-2); }
.block-svc-tag.highlight { border-color: var(--brand); color: var(--brand); background: #EFF6FF; }
.block-svc-tag.mq { border-color: #FDE68A; color: var(--orange); background: #FFFBEB; }

/* Block Detail */
.block-detail { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.block-item.expanded .block-detail { display: block; }

.detail-tabs { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
.dtab { padding: 7px 14px; font-size: 12px; color: var(--text-3); cursor: pointer; border-bottom: 2px solid transparent; transition: all var(--transition); }
.dtab:hover { color: var(--text-2); }
.dtab.active { color: var(--brand); border-bottom-color: var(--brand); }
.dpanel { display: none; }
.dpanel.active { display: block; }

/* Flow */
.flow-list { list-style: none; }
.flow-item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; }
.flow-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; background: var(--brand); }
.flow-item.cross .flow-dot { background: var(--orange); }
.flow-text { font-size: 12px; color: var(--text-2); }
.flow-text .svc { font-weight: 600; color: var(--text-1); }
.flow-text .arr { color: var(--text-3); }

/* Mermaid */
.mermaid-box { background: var(--surface-2); border-radius: 8px; padding: 14px; overflow-x: auto; border: 1px solid var(--border); }

/* Error table */
.etable { width: 100%; border-collapse: collapse; font-size: 12px; }
.etable th { text-align: left; padding: 6px 10px; color: var(--text-3); border-bottom: 1px solid var(--border); }
.etable td { padding: 6px 10px; color: var(--text-2); border-bottom: 1px solid var(--border); }

/* Note */
.note-box { background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--text-2); line-height: 1.6; }

/* Writes */
.writes { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.writes-label { font-size: 11px; color: var(--text-3); }
.write-tag { font-size: 11px; padding: 2px 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; font-family: monospace; color: var(--text-2); }

/* Close block */
.block-close { font-size: 11px; color: var(--brand); cursor: pointer; margin-top: 10px; display: inline-block; }
.block-close:hover { text-decoration: underline; }

@media (max-width: 768px) {
  .arch-map, .blocks-panel { padding: 0 12px; }
  .block-grid { grid-template-columns: 1fr; }
  .arch-nodes { gap: 6px; }
  .arch-node { padding: 8px 12px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>fresh-mart</h1>
  <p>点击服务节点查看其支持的功能积木</p>
  <div class="header-stats" id="header-stats"></div>
</div>

<div class="arch-map" id="arch-map"></div>
<div class="blocks-panel" id="blocks-panel"></div>

<script>
mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });

// === Build service map ===
const svcMap = {};  // service -> [block, ...]
const allBlocks = [];
Object.entries(BLOCKS_DATA).forEach(([group, blocks]) => {
  blocks.forEach(b => {
    const block = { ...b, group };
    allBlocks.push(block);
    b.services.forEach(s => {
      if (!svcMap[s]) svcMap[s] = [];
      svcMap[s].push(block);
    });
  });
});

// Service topology definition — 由 vibe-blocks build 注入（基于实际积木自动推导）
const layers = LAYERS_DATA;

let activeService = null;

// === Render Stats ===
document.getElementById('header-stats').innerHTML =
  `<span class="header-stat"><strong>${BLOCKS_STATS.total}</strong> 积木</span>` +
  `<span class="header-stat"><strong>${Object.keys(svcMap).length}</strong> 服务</span>` +
  `<span class="header-stat"><strong>${Object.keys(BLOCKS_DATA).length}</strong> 分组</span>`;

// === Render Architecture Map ===
function renderArchMap() {
  const map = document.getElementById('arch-map');
  map.innerHTML = layers.map((layer, i) => {
    const nodes = layer.services.map(svc => {
      const count = (svcMap[svc] || []).length;
      const isActive = activeService === svc;
      const hasBlocks = count > 0;
      return `<div class="arch-node ${layer.type} ${isActive ? 'active' : ''} ${!hasBlocks ? 'no-blocks' : ''}"
                   data-svc="${svc}" ${!hasBlocks ? 'style="opacity:0.4;cursor:default;"' : ''}>
        ${svc}
        ${count > 0 ? `<span class="node-count">${count}</span>` : ''}
      </div>`;
    }).join('');

    const nextLayer = layers[i + 1];
    const arrow = (i < layers.length - 1 && layer.type !== nextLayer.type) ? '<div class="arch-arrow">↓</div>' : '';

    return `<div class="arch-layer">
      <span class="arch-layer-label">${layer.label}</span>
      <div class="arch-nodes">${nodes}</div>
    </div>${arrow}`;
  }).join('');

  // Bind click
  map.querySelectorAll('.arch-node').forEach(node => {
    node.addEventListener('click', () => {
      const svc = node.dataset.svc;
      if (!(svcMap[svc] || []).length) return;
      if (activeService === svc) {
        activeService = null;
        document.getElementById('blocks-panel').classList.remove('visible');
      } else {
        activeService = svc;
        renderBlocksPanel(svc);
      }
      renderArchMap();
    });
  });
}

// === Render Blocks Panel ===
function renderBlocksPanel(svc) {
  const panel = document.getElementById('blocks-panel');
  const blocks = svcMap[svc] || [];
  panel.classList.add('visible');

  // Group blocks by their group name
  const grouped = {};
  blocks.forEach(b => {
    if (!grouped[b.group]) grouped[b.group] = [];
    grouped[b.group].push(b);
  });

  // Determine dot color
  const layer = layers.find(l => l.services.includes(svc));
  const dotColor = layer ? (layer.type === 'bff' ? 'var(--blue)' : layer.type === 'core' ? 'var(--purple)' : layer.type === 'external' ? 'var(--orange)' : 'var(--green)') : 'var(--brand)';

  let html = `<div class="panel-header">
    <div class="panel-title">
      <span class="svc-dot" style="background:${dotColor}"></span>
      <span>${esc(svc)}</span>
      <span style="font-size:12px;color:var(--text-3);font-weight:400;">${blocks.length} 个功能积木</span>
    </div>
    <button class="panel-close" id="panel-close">✕</button>
  </div>`;

  Object.entries(grouped).forEach(([groupName, groupBlocks]) => {
    html += `<div class="block-group">
      <div class="block-group-title">${esc(groupName)}</div>
      <div class="block-grid">`;

    groupBlocks.forEach(block => {
      const svcs = block.services.map(s =>
        `<span class="block-svc-tag ${s === svc ? 'highlight' : ''} ${(s === 'MQ' || s === '消息队列' || /rocket\s*mq|kafka|rabbit\s*mq/i.test(s)) ? 'mq' : ''}">${s}</span>`
      ).join('') + (block.hasMQ ? '<span class="block-svc-tag mq">MQ</span>' : '');

      const stepsHtml = buildSteps(block.steps);
      const errHtml = buildErrors(block.errors);
      const writesHtml = buildWrites(block.writes);

      html += `<div class="block-item" data-id="${block.id}">
        <div class="block-item-top">
          <span class="block-item-name">${esc(block.name)}</span>
        </div>
        <div class="block-item-trigger">${esc(block.trigger)}</div>
        <div class="block-item-services">${svcs}</div>
        <div class="block-detail">
          <div class="detail-tabs">
            <span class="dtab active" data-t="flow">链路</span>
            <span class="dtab" data-t="seq">时序图</span>
            ${block.errors && block.errors.length ? '<span class="dtab" data-t="err">异常</span>' : ''}
            ${block.note ? '<span class="dtab" data-t="note">备注</span>' : ''}
          </div>
          <div class="dpanel active" data-p="flow">${stepsHtml}${writesHtml}</div>
          <div class="dpanel" data-p="seq"><div class="mermaid-box"><pre class="mermaid">${block.mermaid}</pre></div></div>
          ${block.errors && block.errors.length ? `<div class="dpanel" data-p="err">${errHtml}</div>` : ''}
          ${block.note ? `<div class="dpanel" data-p="note"><div class="note-box">${esc(block.note)}</div></div>` : ''}
          <span class="block-close">收起</span>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  panel.innerHTML = html;

  // Bind events
  document.getElementById('panel-close').addEventListener('click', () => {
    activeService = null;
    panel.classList.remove('visible');
    renderArchMap();
  });

  panel.querySelectorAll('.block-item').forEach(item => {
    item.addEventListener('click', (e) => {
      if (item.classList.contains('expanded') && !e.target.classList.contains('dtab') && !e.target.classList.contains('block-close')) return;
      if (e.target.classList.contains('block-close')) {
        item.classList.remove('expanded');
        return;
      }
      if (e.target.classList.contains('dtab')) {
        const tab = e.target.dataset.t;
        item.querySelectorAll('.dtab').forEach(t => t.classList.remove('active'));
        item.querySelectorAll('.dpanel').forEach(p => p.classList.remove('active'));
        e.target.classList.add('active');
        item.querySelector(`[data-p="${tab}"]`).classList.add('active');
        if (tab === 'seq') {
          const mel = item.querySelector('.mermaid');
          if (mel && !mel.dataset.rendered) { mermaid.run({ nodes: [mel] }); mel.dataset.rendered = 'true'; }
        }
        return;
      }
      // Expand
      panel.querySelectorAll('.block-item.expanded').forEach(i => i.classList.remove('expanded'));
      item.classList.add('expanded');
      setTimeout(() => item.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
    });
  });

  // Scroll to panel
  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}

// === Helpers ===
function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

function buildSteps(steps) {
  if (!steps || !steps.length) return '<p style="color:var(--text-3);font-size:12px;">无</p>';
  return `<ul class="flow-list">${steps.map(s => {
    const isCross = s.includes('→');
    let text = esc(s);
    if (isCross) {
      text = text.replace(/^(.+?)→(.+?):(.*)$/, '<span class="svc">$1</span><span class="arr"> → </span><span class="svc">$2</span>:$3');
    } else {
      text = text.replace(/^\[(.+?)\]\s*(.*)$/, '<span class="svc">[$1]</span> $2');
    }
    return `<li class="flow-item ${isCross ? 'cross' : ''}"><span class="flow-dot"></span><span class="flow-text">${text}</span></li>`;
  }).join('')}</ul>`;
}

function buildErrors(errors) {
  if (!errors || !errors.length) return '';
  return `<table class="etable"><thead><tr><th>场景</th><th>处理</th><th>返回</th></tr></thead><tbody>${errors.map(e => `<tr><td>${esc(e[0])}</td><td>${esc(e[1])}</td><td>${esc(e[2])}</td></tr>`).join('')}</tbody></table>`;
}

function buildWrites(writes) {
  if (!writes || !writes.length) return '';
  return `<div class="writes"><span class="writes-label">写表:</span>${writes.map(w => `<span class="write-tag">${esc(w)}</span>`).join('')}</div>`;
}

// === Keyboard ===
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    activeService = null;
    document.getElementById('blocks-panel').classList.remove('visible');
    document.querySelectorAll('.block-item.expanded').forEach(i => i.classList.remove('expanded'));
    renderArchMap();
  }
});

// === Init ===
renderArchMap();
</script>
</body>
</html>
